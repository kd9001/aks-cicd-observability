name: CI-CD Pipleine

on:
    push:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Build Docker Image
              run: dockerbuild -t flaskapp:${{github.sha}} ./app

            - name: Show Image Built
              run : docker images