name: CI-CD Pipleine

on:
    push:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        
        steps:
            - name: Checkout Code
              uses: actions/checkout@v5

            - name: Set up Docker
              uses: docker/setup-buildx-action@v4         

            - name: Build Docker Image
              run: docker build -t flaskapp:${{github.sha}} ./app

            - name: Show Image Built
              run : docker images